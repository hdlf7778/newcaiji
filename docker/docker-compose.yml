services:
  # ============================================================
  # MySQL 8.0
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: collector-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../database/sample-data.sql:/docker-entrypoint-initdb.d/02-sample-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 6.0
  # ============================================================
  redis:
    image: redis:6.0
    container_name: collector-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Prometheus + Grafana (可观测性)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: collector-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:10.4.0
    container_name: collector-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ============================================================
  # Spring Boot 管理端
  # ============================================================
  task-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.task-manager
    container_name: collector-task-manager
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      WORKER_API_URL: http://worker-api:8001
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # Python Worker — HTTP (3副本, 模板 A/C/D/H/I/J)
  # ============================================================
  worker-http:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: python worker.py --queue http --metrics-port 9090
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      METRICS_PORT: 9090
      HTTP_CONCURRENCY: ${HTTP_CONCURRENCY}
    deploy:
      replicas: 3

  # ============================================================
  # Python Worker — Browser (2副本, 模板 B/F/G)
  # ============================================================
  worker-browser:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: python worker.py --queue browser --metrics-port 9091
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      METRICS_PORT: 9091
      BROWSER_CONCURRENCY: ${BROWSER_CONCURRENCY}
    shm_size: '2gb'
    deploy:
      replicas: 2

  # ============================================================
  # Python LLM API Server (FastAPI)
  # ============================================================
  worker-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: python api_server.py
    container_name: collector-worker-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}

  # ============================================================
  # Vue3 前端 + Nginx 反向代理
  # ============================================================
  web-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web-admin
    container_name: collector-web-admin
    restart: unless-stopped
    depends_on:
      - task-manager
    ports:
      - "80:80"

volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:
